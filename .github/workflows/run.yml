name: AI 및 보험 AX 동향 모니터링 자동 실행

on:
  # 한국시간(KST) 매일 아침 08:00에 실행 = UTC 전날 밤 23:00
  schedule:
    - cron: "0 23 * * *"

  # 수동 실행 버튼 (즉시 테스트용)
  workflow_dispatch:

# 웹페이지 배포 및 레포지토리 쓰기를 위해 권한을 명확히 부여합니다.
permissions:
  contents: write
  pages: write
  id-token: write
  
jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 저장소에 누적 보관 중인 data/it_news.json을 함께 가져옵니다.
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: IT 뉴스 모니터링 및 HTML 생성
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:      ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT:         ${{ secrets.RECIPIENT }}
        run: python it_news_monitor.py

      # 💡 [해결책 1] Jekyll 빌드 오류를 방지하기 위해 .nojekyll 파일을 강제로 생성합니다.
      - name: Jekyll 빌드 비활성화 설정
        run: touch .nojekyll

      # 💡 [해결책 2] 업로드 단계를 먼저 명확하게 처리하고 최신 v4 액션을 사용합니다.
      - name: GitHub Pages 환경 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.' # 현재 폴더에 있는 index.html과 .nojekyll을 빌드 대상으로 지정

      # 💡 [해결책 3] 최종 배포 스위치를 올려 웹사이트를 먼저 배포합니다.
      - name: 웹사이트 배포 실행
        uses: actions/deploy-pages@v4

      # 💡 [순서 조정] 배포가 안전하게 끝난 후, 데이터 찌꺼기들을 원격 저장소(Main Branch)에 기록합니다.
      - name: 변경된 데이터 및 HTML을 저장소에 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 생성된 모든 결과물(.nojekyll 포함)을 추가
          git add data/it_news.json index.html .nojekyll || true
          
          if ! git diff --staged --quiet; then
            git commit -m "💡 자동 업데이트: 데이터 누적 및 웹페이지 갱신"
            git push origin main
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi
