name: AI 및 보험 AX 동향 모니터링 자동 실행

on:
  # 한국시간(KST) 매일 아침 08:00에 실행 = UTC 전날 밤 23:00
  schedule:
    - cron: "0 23 * * *"

  # 수동 실행 버튼 (즉시 테스트용)
  workflow_dispatch:

# 💡 웹페이지 배포를 위해 깃허브 액션스 서버에 권한을 부여합니다.
permissions:
  contents: write
  pages: write
  id-token: write
  
jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 저장소에 누적 보관 중인 data/it_news.json을 함께 가져옵니다.
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: IT 뉴스 모니터링 및 HTML 생성
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW:      ${{ secrets.GMAIL_APP_PW }}
          RECIPIENT:         ${{ secrets.RECIPIENT }}
        run: python it_news_monitor.py

    # 파이썬이 만든 index.html과 데이터(it_news.json)를 저장소에 기록
      - name: 변경된 데이터 및 HTML을 저장소에 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # json과 html 파일을 모두 깃에 추가
          git add data/it_news.json index.html || true
          
          if ! git diff --staged --quiet; then
            git commit -m "💡 자동 업데이트: 데이터 누적 및 웹페이지 갱신"
            git push origin main
          else
            echo "변경사항이 없어 푸시를 건너뜁니다."
          fi

      # 💡 [새로 추가] 생성된 index.html 파일을 인터넷에 웹사이트로 배포합니다.
      - name: GitHub Pages 환경 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 현재 폴더에 있는 index.html을 타겟으로 잡음

      # 💡 [새로 추가] 최종 배포 스위치 올리기
      - name: 웹사이트 배포 실행
        uses: actions/deploy-pages@v4
